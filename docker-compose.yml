services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gym_platform
      POSTGRES_USER: gym
      POSTGRES_PASSWORD: gym
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym -d gym_platform"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  api:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm run migrate -w @gym-platform/api && npm run dev:api"
    environment:
      NODE_ENV: development
      PERSISTENCE_DRIVER: postgres
      API_HOST: 0.0.0.0
      API_PORT: 4000
      ACCESS_TOKEN_SECRET: local-dev-secret-change-me
      DATABASE_URL: postgres://gym:gym@postgres:5432/gym_platform
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
  worker:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm run dev:worker"
    environment:
      NODE_ENV: development
      WORKER_NAME: local-worker
      WORKER_POLL_INTERVAL_MS: 1000
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://gym:gym@postgres:5432/gym_platform
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
volumes:
  postgres-data:
